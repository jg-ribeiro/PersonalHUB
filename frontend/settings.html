<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Settings | Homelab Hub</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface": "#dee5ff",
              "surface-container": "#0f1930",
              "surface": "#060e20",
              "background": "#060e20",
              "primary": "#a7a5ff",
              "primary-dim": "#645efb",
              "secondary": "#34b5fa",
              "surface-container-low": "#091328",
              "surface-container-highest": "#192540",
              "outline-variant": "#40485d",
              "on-surface-variant": "#a3aac4",
              "on-primary": "#1c00a0",
              "error": "#ff6e84",
              "on-background": "#dee5ff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"]
            }
          }
        }
      }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .glass-sidebar { background: rgba(9, 19, 40, 0.6); backdrop-filter: blur(20px); }
        
        /* Tema Claro (Inverso) */
        .dark body { background-color: #060e20; color: #dee5ff; }
        html:not(.dark) body { background-color: #f0f4ff; color: #060e20; }
        
        html:not(.dark) .bg-background { background-color: #f0f4ff; }
        html:not(.dark) .text-on-surface { color: #060e20; }
        html:not(.dark) .bg-surface-container-low { background-color: #ffffff; }
        html:not(.dark) .bg-surface-container-highest { background-color: #e0e6f5; }
        html:not(.dark) .glass-sidebar { background: rgba(255, 255, 255, 0.6); border-color: rgba(0,0,0,0.1); }
        html:not(.dark) .text-slate-400 { color: #64748b; }
        
        /* Sidebar collapsed state */
        #sidebar.collapsed { width: 80px; }
        #sidebar.collapsed .sidebar-text { display: none; }
        #sidebar.collapsed .sidebar-collapsed-text { display: inline; }
        #sidebar.collapsed .sidebar-header { padding-left: 0; padding-right: 0; display: flex; justify-content: center; }
        #sidebar.collapsed .sidebar-header h1 { font-size: 1.25rem; }
        #sidebar.collapsed .sidebar-header p { display: none; }
        #sidebar.collapsed nav a, #sidebar.collapsed nav div { justify-content: center; padding-left: 0; padding-right: 0; }
        
        main.sidebar-collapsed { margin-left: 80px; }
        @media (max-width: 768px) {
            main.sidebar-collapsed { margin-left: 0; }
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen">
    <!-- Sidebar -->
    <aside id="sidebar" class="h-screen w-64 fixed left-0 top-0 hidden md:flex flex-col py-6 glass-sidebar border-r border-outline-variant/10 z-50 transition-all duration-300">
        <div class="px-6 mb-10 sidebar-header relative">
            <h1 class="text-xl font-bold bg-gradient-to-br from-[#a7a5ff] to-[#645efb] bg-clip-text text-transparent font-headline tracking-tighter">
                <span class="sidebar-text">HOMELAB</span>
                <span class="sidebar-collapsed-text hidden">H</span>
            </h1>
            <p class="sidebar-text text-[11px] text-slate-400 uppercase tracking-widest">Settings Mode</p>

            <button id="sidebar-toggle" class="absolute -right-3 top-0 bg-surface-container-highest text-primary rounded-full p-1 shadow-lg hover:text-secondary transition-colors border border-outline-variant/20">
                <span class="material-symbols-outlined text-sm" id="toggle-icon">chevron_left</span>
            </button>
        </div>
        <nav class="flex-1 space-y-1">
            <a href="index.html" class="flex items-center gap-3 px-6 py-3 text-slate-400 hover:text-slate-100 hover:bg-[#192540] transition-all font-['Manrope'] font-semibold tracking-wide uppercase text-[11px]">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="sidebar-text">Back to Dashboard</span>
            </a>
            <div class="px-6 py-3 bg-gradient-to-r from-[#a7a5ff]/10 to-transparent text-[#a7a5ff] border-r-2 border-[#a7a5ff] font-['Manrope'] font-semibold tracking-wide uppercase text-[11px] flex items-center gap-3">
                <span class="material-symbols-outlined">settings</span>
                <span class="sidebar-text">Services Management</span>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="ml-0 md:ml-64 pt-24 px-8 pb-12 max-w-6xl mx-auto transition-all duration-300">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-extrabold font-headline tracking-tight">Active Services</h2>
                <p class="text-on-surface-variant text-sm mt-1">Manage shortcuts and redirection nodes.</p>
            </div>
            <div class="flex items-center gap-4">
                <button class="p-2 text-slate-400 hover:text-secondary transition-colors" id="theme-toggle">
                    <span class="material-symbols-outlined" id="theme-icon">light_mode</span>
                </button>
                <button id="manage-categories-btn" class="flex items-center gap-2 px-5 py-2.5 bg-surface-container-highest text-primary rounded-lg text-sm font-bold hover:bg-surface-variant transition-all border border-outline-variant/20">
                    <span class="material-symbols-outlined text-sm">category</span>
                    Manage Categories
                </button>
                <button id="add-service-btn" class="flex items-center gap-2 px-5 py-2.5 bg-primary text-on-primary rounded-lg text-sm font-bold hover:bg-primary-dim transition-all shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined text-sm">add</span>
                    Add New Service
                </button>
            </div>
        </header>

        <!-- Services Management Section -->
        <section id="services-section" class="bg-surface-container-low rounded-xl overflow-hidden border border-outline-variant/10 shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-surface-container text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">
                        <th class="px-6 py-4">Service</th>
                        <th class="px-6 py-4">URL</th>
                        <th class="px-6 py-4">Category</th>
                        <th class="px-6 py-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="services-table-body" class="divide-y divide-outline-variant/5">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </section>

        <!-- Categories Management Section -->
        <section id="categories-section" class="hidden bg-surface-container-low rounded-xl overflow-hidden border border-outline-variant/10 shadow-2xl">
            <div class="p-6 flex justify-between items-center border-b border-outline-variant/10">
                <h3 class="font-headline font-bold text-lg">System Sectors</h3>
                <button id="add-category-btn" class="px-4 py-2 bg-secondary text-on-secondary rounded-lg text-xs font-bold hover:opacity-90 transition-all">
                    Add Sector
                </button>
            </div>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-surface-container text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">
                        <th class="px-6 py-4">Sector Name</th>
                        <th class="px-6 py-4">Description</th>
                        <th class="px-6 py-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="categories-table-body" class="divide-y divide-outline-variant/5">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- Modal Form for Apps -->
    <div id="service-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-surface-container-high w-full max-w-lg rounded-2xl shadow-2xl border border-outline-variant/20 p-8">
            <h3 id="modal-title" class="text-2xl font-bold font-headline mb-6">Add Service</h3>
            <form id="service-form" class="space-y-5">
                <input type="hidden" id="service-id">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Service Name</label>
                    <input type="text" id="name" required class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/50 outline-none text-on-surface">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">URL</label>
                    <input type="url" id="url" required class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/50 outline-none text-on-surface">
                </div>
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Category</label>
                        <select id="category" class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/50 outline-none text-on-surface">
                            <!-- Populated via JS -->
                        </select>
                    </div>
                </div>

                <div id="custom-icon-group">
                    <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Service Icon (SVG/PNG)</label>
                    <div class="flex items-center gap-4">
                        <label for="custom-icon-upload" class="cursor-pointer px-4 py-2 bg-surface-container-highest hover:bg-surface-variant rounded-lg text-xs font-bold transition-colors border border-outline-variant/20">
                            Upload Icon
                        </label>
                        <div id="icon-preview" class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center overflow-hidden border border-outline-variant/20">
                            <span class="material-symbols-outlined text-on-surface-variant">apps</span>
                        </div>
                        <input type="file" id="custom-icon-upload" accept=".svg,.png,.jpg,.jpeg" class="hidden">
                        <span id="file-name" class="text-xs text-on-surface-variant truncate max-w-[150px]">Default icon used</span>
                    </div>
                    <input type="hidden" id="custom-icon-data">
                </div>
                <div class="flex justify-end gap-3 mt-8">
                    <button type="button" id="close-modal" class="px-6 py-2.5 text-sm font-bold text-on-surface-variant hover:text-on-surface transition-colors">Cancel</button>
                    <button type="submit" class="px-6 py-2.5 bg-primary text-on-primary rounded-lg text-sm font-bold hover:bg-primary-dim transition-all shadow-lg shadow-primary/20">Save Service</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Form for Categories -->
    <div id="category-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
        <div class="bg-surface-container-high w-full max-w-md rounded-2xl shadow-2xl border border-outline-variant/20 p-8">
            <h3 id="category-modal-title" class="text-2xl font-bold font-headline mb-6">Add Sector</h3>
            <form id="category-form" class="space-y-5">
                <input type="hidden" id="category-id">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Sector Name</label>
                    <input type="text" id="cat-name" required class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-secondary/50 outline-none text-on-surface">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2">Description</label>
                    <textarea id="cat-description" class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-secondary/50 outline-none text-on-surface resize-none h-24"></textarea>
                </div>
                <div class="flex justify-end gap-3 mt-8">
                    <button type="button" id="close-category-modal" class="px-6 py-2.5 text-sm font-bold text-on-surface-variant hover:text-on-surface transition-colors">Cancel</button>
                    <button type="submit" class="px-6 py-2.5 bg-secondary text-on-secondary rounded-lg text-sm font-bold hover:opacity-90 transition-all shadow-lg shadow-secondary/20">Save Sector</button>
                </div>
            </form>
        </div>
    </div>

    <script src="common.js"></script>
    <script src="settings.js"></script>
</body>
</html>
