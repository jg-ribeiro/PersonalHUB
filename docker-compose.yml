version: '3.8'

services:
  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Aqui você deve colocar o IP da sua VPS ou do servidor de banco
      - DB_HOST=${DB_HOST:-172.17.0.1} 
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    networks:
      - personalhub-net

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - personalhub-net

networks:
  personalhub-net:
    driver: bridge
